services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })", "--quiet"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  microblog-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: microblog
      MONGODB_PING_ON_STARTUP: "true"
    depends_on:
      mongo:
        condition: service_healthy
    profiles: ["full"]

volumes:
  mongo_data:
